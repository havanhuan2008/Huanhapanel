<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 15px;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .input-wrap input {
      width: 100%;
      height: 52px;
      border: 1px solid #dcdcdc;
      border-radius: 10px;
      padding: 0 50px 0 14px;
      font-size: 15px;
      color: #111;
      background: #fff;
      outline: none;
    }

    .copy-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .copy-btn svg {
      width: 20px;
      height: 20px;
      fill: #555;
      transition: 0.2s;
    }

    .copy-btn:hover svg {
      fill: #000;
    }

    .image-box {
      margin-top: 18px;
      width: 100%;
    }

    .image-box img {
      width: 100%;
      display: block;
      border-radius: 10px;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Ô input copy nội dung Zalo -->
    <div class="input-wrap">
      <input
        id="zaloText"
        type="text"
        readonly
        value="Vui lòng liên hệ Zalo 0325575642 để cập nhật app mới nếu bạn đã mua"
      />
      <button class="copy-btn" onclick="copyText('zaloText')" aria-label="Copy nội dung Zalo">
        <svg viewBox="0 0 24 24">
          <path d="M16 1H6a2 2 0 0 0-2 2v12h2V3h10V1zm3 4H10a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H10V7h9v14z"/>
        </svg>
      </button>
    </div>

    <!-- Ô input copy link app mới -->
    <div class="input-wrap">
      <input
        id="appLink"
        type="text"
        readonly
        value="https://vt.tiktok.com/ZSuQ4C1uy/"
      />
      <button class="copy-btn" onclick="copyText('appLink')" aria-label="Copy link app">
        <svg viewBox="0 0 24 24">
          <path d="M16 1H6a2 2 0 0 0-2 2v12h2V3h10V1zm3 4H10a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H10V7h9v14z"/>
        </svg>
      </button>
    </div>

    <!-- Hình ảnh bên dưới -->
    <div class="image-box">
      <img src="https://sf-static.upanhlaylink.com/img/image_2026031750faa101fee06e5fe01e3135ae854e3b.jpg" alt="Hình ảnh app" />
    </div>

  </div>

  <script>
    function copyText(id) {
      const input = document.getElementById(id);
      navigator.clipboard.writeText(input.value);
    }
  </script>
</body>
</html>
